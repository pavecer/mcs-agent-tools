name: Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Run every Monday at 08:00 UTC to catch newly disclosed CVEs
    - cron: "0 8 * * 1"

permissions:
  contents: read

jobs:
  # ── 1. Bandit — Python static application security testing ─────────────────
  bandit:
    name: Bandit SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run Bandit
        run: |
          uv run bandit -c pyproject.toml -r . -f json -o bandit-results.json || true

      - name: Upload Bandit results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-results
          path: bandit-results.json

  # ── 2. pip-audit — dependency vulnerability scanning ───────────────────────
  pip-audit:
    name: pip-audit (CVE check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run pip-audit
        run: uv run pip-audit --strict

  # ── 3. CodeQL — GitHub's semantic SAST engine ──────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          # Optional: use the security-and-quality query suite for broader coverage
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql
